version: 2.1
orbs:
  slack: circleci/slack@4.4.2
commands:
  notify-fail:
    description: Notify failure via slack
    steps:
      - slack/notify:
          channel: reportscript
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "`reportscript/${CIRCLE_JOB}` Failed, `$CIRCLE_BRANCH` branch :red_circle: (<${CIRCLE_BUILD_URL}|view job>)"
                  }
                }
              ]
            }
  notify-success:
    description: Notify success via slack
    steps:
      - slack/notify:
          channel: reportscript
          event: pass
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "`reportscript/${CIRCLE_JOB}` Succeeded! :tada: `$CIRCLE_BRANCH` branch (<${CIRCLE_BUILD_URL}|view job>)"
                  }
                }
              ]
            }
jobs:
  reportscript-format-check:
    docker:
      - image: cimg/node:24.15
    resource_class: large
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: |
            npm run lint
            npm run prettier
          working_directory: /home/circleci/workspace/reportscript
      - notify-fail
  reportscript-tests:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: npm test
          working_directory: /home/circleci/workspace/reportscript
      - notify-fail
  reportscript-node-install:
    docker:
      # python is required for node-gyp to build the native `canvas` dependency;
      # the -node variant of this tag bundles Node 24 (current LTS)
      - image: cimg/python:3.13-node
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          keys:
            - v3-deps-{{ checksum "package.json" }}
            - v3-deps-
      - run:
          command: npm install
      - save_cache:
          key: v3-deps-{{ checksum "package.json" }}
          paths:
            - node_modules
      - run: mkdir /home/circleci/workspace
      - run: cp -r . /home/circleci/workspace/reportscript
      - persist_to_workspace:
          root: /home/circleci/workspace
          paths:
            - reportscript
      - notify-fail
  ci-jobs-completed:
    docker:
      - image: cimg/base:stable
    steps:
      - notify-success
  release:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          name: semantic-release (version, changelog, tag, GitHub release)
          # @semantic-release/npm runs with npmPublish:false (see .releaserc.json),
          # so it only writes the computed version into package.json - it does not
          # publish. semantic-release is run via npx per its install recommendation.
          command: npx semantic-release@25
          working_directory: /home/circleci/workspace/reportscript
      - run:
          name: npm publish via CircleCI OIDC trusted publishing
          # @semantic-release/npm only implements OIDC trusted publishing for
          # GitHub Actions and GitLab, not CircleCI. The npm CLI (>= 11.5.1,
          # bundled in cimg/node:24.15) does support CircleCI OIDC natively, so
          # the actual publish runs here. semantic-release only bumps the version
          # in package.json when there is a release to make; if it is still the
          # placeholder, there is nothing to publish.
          command: |
            VERSION=$(node -p "require('./package.json').version")
            if [ "$VERSION" = "0.0.0-development" ]; then
              echo "No release was made by semantic-release; skipping npm publish."
              exit 0
            fi
            echo "Publishing reportscript@$VERSION via OIDC trusted publishing"
            npm publish
          working_directory: /home/circleci/workspace/reportscript
      - notify-fail
  build:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: npm run build
          working_directory: /home/circleci/workspace/reportscript
      - persist_to_workspace:
          root: /home/circleci/workspace
          paths:
            - reportscript/dist
      - notify-fail
workflows:
  version: 2
  ci:
    jobs:
      - reportscript-node-install:
          context:
            - Slack
      - reportscript-format-check:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - reportscript-tests:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - build:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - release:
          context:
            - Slack
          requires:
            - reportscript-node-install
            - reportscript-format-check
            - reportscript-tests
            - build
          filters:
            branches:
              only:
                - main
      - ci-jobs-completed:
          context:
            - Slack
          requires:
            - reportscript-format-check
            - reportscript-tests
            - build
            - release
          filters:
            branches:
              ignore:
                - main