version: 2.1
orbs:
  slack: circleci/slack@4.4.2
commands:
  notify-fail:
    description: Notify failure via slack
    steps:
      - slack/notify:
          channel: reportscript
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "`reportscript/${CIRCLE_JOB}` Failed, `$CIRCLE_BRANCH` branch :red_circle: (<${CIRCLE_BUILD_URL}|view job>)"
                  }
                }
              ]
            }
  notify-success:
    description: Notify success via slack
    steps:
      - slack/notify:
          channel: reportscript
          event: pass
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "`reportscript/${CIRCLE_JOB}` Succeeded! :tada: `$CIRCLE_BRANCH` branch (<${CIRCLE_BUILD_URL}|view job>)"
                  }
                }
              ]
            }
  notify-publish-success:
    description: >
      Notify Slack of a successful npm publish, including the version.
      No-op when semantic-release made no release (no /tmp/released-version).
    steps:
      - run:
          name: Notify Slack of successful publish
          when: on_success
          command: |
            if [ ! -f /tmp/released-version ]; then
              echo "No release was published; skipping Slack notification."
              exit 0
            fi
            VERSION=$(cat /tmp/released-version)
            # Slack's chat.postMessage returns HTTP 200 even on API errors, so
            # check the `ok` field. A failed notification must not fail the job:
            # the publish already succeeded by this point.
            RESPONSE=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_ACCESS_TOKEN}" \
              -H "Content-type: application/json; charset=utf-8" \
              --data "{
                \"channel\": \"reportscript\",
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \":rocket: Published *reportscript@${VERSION}* to npm! (<${CIRCLE_BUILD_URL}|view job>)\"
                    }
                  }
                ]
              }")
            if echo "$RESPONSE" | grep -q '"ok":true'; then
              echo "Slack notified of reportscript@${VERSION} publish."
            else
              echo "WARNING: Slack notification failed: $RESPONSE"
            fi
jobs:
  reportscript-format-check:
    docker:
      - image: cimg/node:24.15
    resource_class: large
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: |
            npm run lint
            npm run prettier
          working_directory: /home/circleci/workspace/reportscript
      - notify-fail
  reportscript-tests:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: npm test
          working_directory: /home/circleci/workspace/reportscript
      - notify-fail
  reportscript-node-install:
    docker:
      # python is required for node-gyp to build the native `canvas` dependency;
      # the -node variant of this tag bundles Node 24 (current LTS)
      - image: cimg/python:3.13-node
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          keys:
            - v4-deps-{{ checksum "package-lock.json" }}
            - v4-deps-
      - run:
          # npm ci installs strictly from the committed lockfile for
          # deterministic, reproducible builds
          command: npm ci
      - save_cache:
          key: v4-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run: mkdir /home/circleci/workspace
      - run: cp -r . /home/circleci/workspace/reportscript
      - persist_to_workspace:
          root: /home/circleci/workspace
          paths:
            - reportscript
      - notify-fail
  ci-jobs-completed:
    docker:
      - image: cimg/base:stable
    steps:
      - notify-success
  release:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          name: semantic-release (version, changelog, npm publish, tag, GitHub release)
          # semantic-release runs the whole release: @semantic-release/npm
          # (npmPublish:false) writes the computed version into package.json,
          # then @semantic-release/exec's publishCmd does the actual npm publish
          # via CircleCI OIDC trusted publishing - see .releaserc.json. Running
          # the publish inside semantic-release's lifecycle means a failed
          # publish fails the whole release, so the git tag and GitHub release
          # are not created for a version that never made it to npm.
          #
          # npm does not auto-detect CircleCI OIDC the way it does GitHub Actions
          # and GitLab, so publishCmd mints an OIDC token (aud npm:registry.
          # npmjs.org) and exports it as NPM_ID_TOKEN. The `circleci` binary used
          # to mint it is injected into the job environment by CircleCI and
          # includes the oidc plugin - it must NOT be installed/overwritten via
          # install.sh or the circleci-cli orb, which provide the public CLI
          # that lacks the oidc plugin.
          #
          # publishCmd writes the released version to /tmp/released-version so
          # the next step can post a Slack notification only when a release
          # actually happened (semantic-release is a no-op when there are no
          # releasable commits).
          command: npx semantic-release@25
          working_directory: /home/circleci/workspace/reportscript
      - notify-publish-success
      - notify-fail
  build:
    docker:
      - image: cimg/node:24.15
    resource_class: small
    steps:
      - attach_workspace:
          at: /home/circleci/workspace
      - run:
          command: npm run build
          working_directory: /home/circleci/workspace/reportscript
      - persist_to_workspace:
          root: /home/circleci/workspace
          paths:
            - reportscript/dist
      - notify-fail
workflows:
  version: 2
  ci:
    jobs:
      - reportscript-node-install:
          context:
            - Slack
      - reportscript-format-check:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - reportscript-tests:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - build:
          context:
            - Slack
          requires:
            - reportscript-node-install
      - release:
          context:
            - Slack
          requires:
            - reportscript-node-install
            - reportscript-format-check
            - reportscript-tests
            - build
          filters:
            branches:
              only:
                - main
      - ci-jobs-completed:
          context:
            - Slack
          requires:
            - reportscript-format-check
            - reportscript-tests
            - build
            - release
          filters:
            branches:
              ignore:
                - main